<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AuraWell Dashboard</title>
  <style>
    :root {
      --bg-space: #0f111a;
      --card-glass: rgba(30, 41, 59, 0.7);
      --border-glow: rgba(99, 102, 241, 0.15);
      --text-main: #f8fafc;
      --text-mute: #94a3b8;
      --accent-neon: #6366f1;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      width: 340px;
      background-color: var(--bg-space);
      color: var(--text-main);
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #6366f1, #ec4899);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .brand-name {
      font-size: 1.1rem;
      font-weight: 700;
      background: linear-gradient(to right, #f8fafc, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 10px;
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
      border-radius: 20px;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .card-hero {
      background: var(--card-glass);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-glow);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      margin-bottom: 16px;
    }

    .hero-label {
      font-size: 0.8rem;
      color: var(--text-mute);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .hero-time {
      font-size: 2.5rem;
      font-weight: 800;
      color: #ffffff;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-mute);
      margin-bottom: 10px;
    }

    .site-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
      max-height: 200px;
      overflow-y: auto;
    }

    .site-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(30, 41, 59, 0.4);
      border: 1px solid rgba(255,255,255,0.03);
      padding: 10px 14px;
      border-radius: 10px;
    }

    .site-domain {
      font-size: 0.85rem;
      font-weight: 500;
      color: #f1f5f9;
    }

    .site-duration {
      font-size: 0.85rem;
      font-weight: 600;
      color: #34d399;
    }

    .empty-state {
      font-size: 0.8rem;
      color: var(--text-mute);
      text-align: center;
      padding: 20px;
      border: 1px dashed rgba(255,255,255,0.05);
      border-radius: 10px;
    }

    .btn-action {
      width: 100%;
      background: var(--accent-neon);
      color: #ffffff;
      border: none;
      padding: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="brand">
      <div class="brand-logo">???</div>
      <h1 class="brand-name">AuraWell</h1>
    </div>
    <div class="status-badge">Live Tracking</div>
  </div>

  <div class="card-hero">
    <div class="hero-label">Total Activity Counts</div>
    <div class="hero-time" id="total-time">0 hits</div>
  </div>

  <h2 class="section-title">Active Laptop Tabs</h2>
  <div class="site-list" id="dynamic-site-list">
    <div class="empty-state">No tabs tracked yet. Change tabs to test!</div>
  </div>

  <button class="btn-action" id="focus-btn">Activate Focus Mode</button>

  <script>
    // Refresh the interface display readings
    function drawUI() {
      chrome.storage.local.get(['total_spent', 'tracked_sites', 'focus_mode_active'], (data) => {
        const total = data.total_spent || 0;
        const sites = data.tracked_sites || {};

        document.getElementById('total-time').innerText = `${total} interactions`;

        const listContainer = document.getElementById('dynamic-site-list');
        listContainer.innerHTML = '';

        const siteKeys = Object.keys(sites);

        if (siteKeys.length === 0) {
          listContainer.innerHTML = '<div class="empty-state">No tabs tracked yet. Change tabs to test!</div>';
        } else {
          siteKeys.sort((a, b) => sites[b] - sites[a]);
          siteKeys.forEach(domain => {
            const row = document.createElement('div');
            row.className = 'site-item';
            row.innerHTML = `
              <span class="site-domain">${domain}</span>
              <span class="site-duration">${sites[domain]} hits</span>
            `;
            listContainer.appendChild(row);
          });
        }

        // Keep Focus Button states running perfectly inline
        const focusBtn = document.getElementById('focus-btn');
        if (data.focus_mode_active) {
          focusBtn.innerText = "Focus Mode: Enabled";
          focusBtn.style.background = "#f43f5e";
        } else {
          focusBtn.innerText = "Activate Focus Mode";
          focusBtn.style.background = "#6366f1";
        }
      });
    }

    // Capture button clicks immediately
    document.getElementById('focus-btn').addEventListener('click', () => {
      chrome.storage.local.get(['focus_mode_active'], (data) => {
        const currentMode = data.focus_mode_active || false;
        chrome.storage.local.set({ focus_mode_active: !currentMode }, () => {
          drawUI();
        });
      });
    });

    // Run render commands when the window displays
    document.addEventListener('DOMContentLoaded', drawUI);
  </script>

</body>
</html>
